<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body>
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип" />
    </div>
    
    <div class="content">
        <h1>Регистрация</h1>
        
        {% if error %}
            <div style="color: red; margin-bottom: 10px;">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <p>
                <input type="text" name="username" placeholder="Имя пользователя" value="{{ username }}" style="width: 100%; padding: 5px;">
            </p>
            <p>
                <input type="email" name="email" placeholder="Email" value="{{ email }}" style="width: 100%; padding: 5px;">
            </p>
            <p>
                <input type="password" name="password" placeholder="Пароль" style="width: 100%; padding: 5px;">
            </p>
            <p>
                <input type="submit" value="Зарегистрироваться" style="padding: 5px 15px;">
            </p>
        </form>
        
        <p><a href="/">На главную</a> | <a href="/login/">Вход</a></p>
    </div>
</body>
</html>
